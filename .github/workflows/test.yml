name: Unit Tests

name: Unit Tests

        uses: actions/upload-artifact@v4
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

        with:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies (skip if missing)
        run: |
          if [ -f ./apps/web/package.json ]; then
            cd ./apps/web
            npm ci
          else
            echo "No ./apps/web/package.json found, skipping npm install."
          fi
      - name: Run Jest tests with coverage (skip if missing)
        run: |
          if [ -f ./apps/web/package.json ]; then
            cd ./apps/web
            npm run test:coverage -- --ci
          else
            echo "No ./apps/web/package.json found, skipping tests."
          fi
      - name: Upload coverage to Codecov (skip if missing)
        if: ${{ exists('apps/web/coverage') }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./apps/web/coverage
          fail_ci_if_error: true
      - name: Upload coverage report (skip if missing)
        if: ${{ exists('apps/web/coverage') }}
        uses: actions/upload-artifact@v4
        with:
          name: jest-coverage-report
          path: ./apps/web/coverage/
          retention-days: 7
          name: jest-coverage-report
          path: ./apps/web/coverage/
          retention-days: 7

